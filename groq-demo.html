<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatPilot – Groq Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
      background: #0f0e17;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fffffe;
    }

    .page {
      width: 100%;
      max-width: 440px;
      padding: 32px 20px;
    }

    /* Top badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.35);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #a5b4fc;
      margin-bottom: 22px;
    }
    .badge span { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #a5b4fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* Card */
    .card {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 16px;
    }

    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
    }

    input[type="password"],
    input[type="text"],
    select,
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fffffe;
      padding: 10px 13px;
      font-size: 13.5px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
    }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(99,102,241,0.7);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.22); }
    select option { background: #1a1a2e; }

    /* Launch button */
    .btn-launch {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.01em;
      box-shadow: 0 4px 18px rgba(99,102,241,0.4);
    }
    .btn-launch:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-launch:active { transform: translateY(0); }

    /* Footer hint */
    .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      text-align: center;
      margin-top: 12px;
      line-height: 1.6;
    }
    .hint a { color: rgba(165,180,252,0.7); text-decoration: none; }
    .hint a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="page">
  <div class="badge"><span></span>Groq-Powered</div>
  <h1>ChatPilot</h1>
  <p class="subtitle">Drop your Groq API key below and launch a full AI chat widget — no install, no build step.</p>

  <div class="card">
    <div class="field">
      <label>Groq API Key</label>
      <input type="password" id="apiKey" placeholder="gsk_..." />
    </div>

    <div class="field">
      <label>Model</label>
      <select id="model">
        <option value="llama-3.3-70b-versatile" selected>llama-3.3-70b-versatile — best quality</option>
        <option value="llama-3.1-8b-instant">llama-3.1-8b-instant — fastest</option>
        <option value="mixtral-8x7b-32768">mixtral-8x7b-32768 — large context</option>
        <option value="gemma2-9b-it">gemma2-9b-it</option>
      </select>
    </div>

    <div class="field">
      <label>Bot Name</label>
      <input type="text" id="botName" value="Aria" />
    </div>

    <div class="field">
      <label>System Prompt</label>
      <textarea id="systemPrompt" rows="4">You are Aria, a brilliant and friendly AI assistant. You give clear, thoughtful, and concise answers. You use markdown for formatting when it helps readability. You are warm, witty, and never condescending.</textarea>
    </div>

    <div class="field">
      <label>WhatsApp Number for Human Handoff <span style="color:rgba(255,255,255,0.3);font-weight:400">(optional — e.g. 447911123456)</span></label>
      <input type="text" id="whatsapp" placeholder="447911123456" />
    </div>

    <div class="field">
      <button class="btn-launch" onclick="launchBot()">Launch Chat Widget ↗</button>
    </div>
  </div>

  <p class="hint">
    Get a free key at <a href="https://console.groq.com" target="_blank" rel="noopener noreferrer">console.groq.com</a>.
    Your key goes directly to Groq — never stored anywhere.
  </p>
</div>

<script src="./src/ChatPilot.js"></script>
<script>
  let chatInstance = null;

  function launchBot() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) { alert('Please enter your Groq API key first.'); return; }

    if (chatInstance) chatInstance.destroy();

    const name = document.getElementById('botName').value.trim() || 'Aria';
    const whatsapp = document.getElementById('whatsapp').value.trim();

    chatInstance = ChatPilot.init({
      apiKey,
      provider: 'groq',
      model: document.getElementById('model').value,
      assistantName: name,
      systemPrompt: document.getElementById('systemPrompt').value,
      welcomeMessage: `Hi! I'm ${name}. How can I help you today? 👋`,
      theme: 'default',
      maxTokens: 1024,
      temperature: 0.7,
      enableMarkdown: true,
      showTypingIndicator: true,
      autoOpen: true,
      handoff: {
        enabled: !!whatsapp,
        whatsapp: whatsapp,
        buttonLabel: 'Talk to a human',
        prefillMessage: `Hi! I was chatting with ${name} and would like to speak with someone from the team.`,
        confirmMessage: `I've opened WhatsApp for you in a new tab — the team will be with you shortly. Is there anything else I can help with in the meantime? 😊`
      }
    });
  }
</script>
</body>
</html>
